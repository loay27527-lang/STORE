<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الطلب - TECHSTORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- App Download Bar -->
<div style="background:linear-gradient(90deg,#1a1a2e,#16213e,#0f3460);padding:10px 20px;text-align:center;border-bottom:1px solid var(--border2);position:relative;z-index:200;">
  <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;">
    <span style="color:var(--text2);font-size:13px;">📲 حمل تطبيق TECHSTORE واستمتع بتجربة تسوق أسرع!</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="https://github.com/loay27527-lang/STORE/releases/download/V1.0/_TECH_STORE_19756376.apk" download style="display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.42.07 2.41.74 3.24.8 1.24-.24 2.43-.93 3.75-.84 1.58.12 2.78.75 3.55 1.9-3.25 1.95-2.48 5.98.66 7.18-.56 1.3-1.13 2.58-3.2 3.82zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        تحميل Android
      </a>
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);color:var(--text3);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,0.15);">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        iOS قريباً
      </span>
    </div>
  </div>
</div>

<div id="header-placeholder"></div>

<div class="ts-page">
  <div class="ts-success-page" style="padding:40px 24px;">
    <div class="ts-success-icon success-icon-anim" style="font-size:50px;">✅</div>
    <h1 style="font-size:28px;font-weight:900;margin-bottom:8px;animation:fadeInUp 0.5s 0.3s both;">تم استلام طلبك! 🎉</h1>
    <p style="color:var(--text3);font-size:15px;margin-bottom:20px;animation:fadeInUp 0.5s 0.4s both;">شكراً على ثقتك في TECHSTORE</p>
    
    <div id="orderInfo" style="background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:20px;margin:16px 0;text-align:right;animation:scaleIn 0.5s 0.5s both;box-shadow:0 8px 30px rgba(0,0,0,0.3);">
    </div>

    <div id="orderItems" style="animation:fadeInUp 0.5s 0.6s both;"></div>
    
    <p style="color:var(--text3);font-size:13px;margin:16px 0 24px;animation:fadeInUp 0.5s 0.7s both;">سيتم التواصل معك خلال 24 ساعة لتأكيد الطلب 📞</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;animation:fadeInUp 0.5s 0.8s both;">
      <a href="account.html" class="ts-btn ts-btn-outline">📦 متابعة طلباتي</a>
      <a href="index.html" class="ts-btn ts-btn-primary">🛍️ مواصلة التسوق</a>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/db.js"></script>
<script src="js/components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await initPage();
  const orderId = localStorage.getItem('ts_lastOrder');
  if (orderId) {
    const orders = DB.get('ts_orders') || [];
    const order = orders.find(o => o.id == orderId);
    if (order) {
      // Launch confetti
      if (typeof launchConfetti === 'function') launchConfetti();

      const payLabel = order.paymentMethod === 'cod' ? '💵 عند الاستلام' : order.paymentMethod === 'card' ? '💳 بطاقة' : '📱 محفظة رقمية';
      document.getElementById('orderInfo').innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">
          <span style="color:var(--text3);">رقم الطلب</span>
          <span style="font-weight:800;color:var(--blue3);">#${String(order.id).slice(-6)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
          <span style="color:var(--text3);">الإجمالي</span>
          <span style="font-weight:900;font-size:18px;color:var(--blue3);">${formatPrice(order.total)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
          <span style="color:var(--text3);">طريقة الدفع</span>
          <span style="font-weight:600;">${payLabel}</span>
        </div>
        ${order.shipping ? `<div style="display:flex;justify-content:space-between;">
          <span style="color:var(--text3);">التوصيل إلى</span>
          <span style="font-weight:600;text-align:left;max-width:60%;">${order.shipping.fullName} - ${order.shipping.city}</span>
        </div>` : ''}
      `;

      // Show ordered products
      if (order.items && order.items.length) {
        document.getElementById('orderItems').innerHTML = `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;">
            <div style="font-size:14px;font-weight:800;margin-bottom:12px;">📦 المنتجات المطلوبة</div>
            ${order.items.map(item => `
              <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
                <img src="${item.img || ''}" style="width:50px;height:50px;object-fit:cover;border-radius:10px;flex-shrink:0;" onerror="this.src='https://placehold.co/50x50/0D1B30/60A5FA?text=📦'">
                <div style="flex:1;text-align:right;">
                  <div style="font-size:13px;font-weight:700;">${item.name}</div>
                  ${item.color ? `<div style="font-size:11px;color:var(--text3);">${item.color}${item.storage ? ' | ' + item.storage : ''}</div>` : ''}
                  <div style="font-size:12px;color:var(--blue3);font-weight:700;margin-top:2px;">${formatPrice(item.price)} × ${item.qty}</div>
                </div>
                <div style="font-size:14px;font-weight:800;color:var(--blue3);flex-shrink:0;">${formatPrice(item.price * item.qty)}</div>
              </div>
            `).join('')}
          </div>`;
      }
    }
  }
});
</script>
</body>
</html>
