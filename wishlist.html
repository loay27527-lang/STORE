<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المفضلة - TECHSTORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- App Download Bar -->
<div style="background:linear-gradient(90deg,#1a1a2e,#16213e,#0f3460);padding:10px 20px;text-align:center;border-bottom:1px solid var(--border2);position:relative;z-index:200;">
  <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;">
    <span style="color:var(--text2);font-size:13px;">📲 حمل تطبيق TECHSTORE واستمتع بتجربة تسوق أسرع!</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="https://github.com/loay27527-lang/STORE/releases/download/V1.0/_TECH_STORE_19756376.apk" download style="display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.42.07 2.41.74 3.24.8 1.24-.24 2.43-.93 3.75-.84 1.58.12 2.78.75 3.55 1.9-3.25 1.95-2.48 5.98.66 7.18-.56 1.3-1.13 2.58-3.2 3.82zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        تحميل Android
      </a>
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);color:var(--text3);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,0.15);">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        iOS قريباً
      </span>
    </div>
  </div>
</div>

<div id="header-placeholder"></div>
<div class="ts-page">
  <div class="ts-breadcrumb"><a href="index.html">الرئيسية</a> › <span>المفضلة</span></div>
  <div class="ts-page-title">❤️ المفضلة</div>
  <div class="ts-grid" id="wishGrid"></div>
  <div id="emptyWish" style="display:none">
    <div class="ts-empty"><div class="empty-icon">🤍</div><h3>المفضلة فارغة</h3><p>أضف منتجات تعجبك عن طريق أيقونة القلب</p><a href="products.html" class="ts-btn ts-btn-primary">تصفح المنتجات</a></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="js/db.js"></script>
<script src="js/components.js"></script>
<script>
function render() {
  const products = DB.getWishlist().map(id => DB.getProduct(id)).filter(Boolean);
  const grid = document.getElementById('wishGrid');
  const empty = document.getElementById('emptyWish');
  if (!products.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = products.map(p => `
  <div class="ts-product-card">
    <div class="ts-product-img">
      <a href="product.html?id=${p.id}"><img src="${p.images[0]}" onerror="this.src='https://placehold.co/300x220/0D1B30/60A5FA?text=📦'"></a>
      ${p.discount ? `<div class="ts-discount-badge">${p.discount}% خصم</div>` : `<div class="ts-new-badge">جديد</div>`}
      <div class="ts-wish-btn active" onclick="removeWish(${p.id})">❤️</div>
    </div>
    <div class="ts-product-body">
      <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit"><div class="ts-product-name">${p.name}</div></a>
      <div class="ts-product-rating"><span class="ts-stars">${renderStars(p.rating)}</span><span class="ts-rating-count">(${p.reviews})</span></div>
      <div class="ts-product-price"><span class="ts-price">${formatPrice(p.price)}</span>${p.oldPrice ? `<span class="ts-old-price">${formatPrice(p.oldPrice)}</span>` : ''}</div>
      <button class="ts-btn ts-btn-primary ts-btn-full ts-btn-sm" onclick="DB.addToCart(${p.id});showToast('تمت الإضافة للسلة 🛒');openCart()">🛒 أضف للسلة</button>
    </div>
  </div>
  `).join('');
}
function removeWish(id) { DB.toggleWishlist(id); showToast('تمت الإزالة من المفضلة'); render(); }
window.removeWish = removeWish;
document.addEventListener('DOMContentLoaded', async () => { await initPage(); render(); });
</script>
</body>
</html>
