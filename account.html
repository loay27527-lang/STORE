<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حسابي - TECHSTORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="background:linear-gradient(90deg,#1a1a2e,#16213e,#0f3460);padding:10px 20px;text-align:center;border-bottom:1px solid var(--border2);z-index:200;">
  <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;">
    <span style="color:var(--text2);font-size:13px;">📲 حمل تطبيق TECHSTORE واستمتع بتجربة تسوق أسرع!</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="https://github.com/loay27527-lang/STORE/releases/download/V1.0/_TECH_STORE_19756376.apk" download style="display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.42.07 2.41.74 3.24.8 1.24-.24 2.43-.93 3.75-.84 1.58.12 2.78.75 3.55 1.9-3.25 1.95-2.48 5.98.66 7.18-.56 1.3-1.13 2.58-3.2 3.82zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        تحميل Android
      </a>
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);color:var(--text3);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,0.15);">iOS قريباً</span>
    </div>
  </div>
</div>

<div id="header-placeholder"></div>
<div class="ts-page"><div id="accountContent"><div class="ts-loading"><div class="ts-spinner"></div></div></div></div>
<div id="footer-placeholder"></div>

<script src="js/db.js"></script>
<script src="js/components.js"></script>
<script>
let activeTab = 'dashboard';

function render() {
  const user = DB.getUser();
  if (!user) {
    showAuthModal();
    document.getElementById('accountContent').innerHTML = '<div class="ts-empty"><div class="empty-icon" style="font-size:48px">🔐</div><h3>يرجى تسجيل الدخول أولاً</h3><p>سجل دخولك للوصول لحسابك</p></div>';
    return;
  }

  const orders = DB.getOrders(user.id);
  const joinDate = user.joinDate ? new Date(user.joinDate).toLocaleDateString('ar-EG', {month:'long', year:'numeric'}) : '';

  const menuItems = [
    {id:'dashboard', icon:'🏠', label:'لوحة التحكم'},
    {id:'orders', icon:'📦', label:'طلباتي'},
    {id:'wishlist', icon:'❤️', label:'المفضلة'},
    {id:'settings', icon:'⚙️', label:'إعدادات الحساب'},
    {id:'support', icon:'🎧', label:'الدعم والمساعدة'},
  ];

  const avatarHTML = user.avatar
    ? `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;">`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="var(--blue3)" stroke-width="1.5" width="28" height="28"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

  const sidebar = `
  <div class="ts-sidebar-menu">
    <div style="padding:20px;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">${avatarHTML}</div>
        <div>
          <div style="font-size:15px;font-weight:800;">${user.name}</div>
          <div style="font-size:12px;color:var(--text3);">عضو منذ ${joinDate}</div>
        </div>
      </div>
    </div>
    ${menuItems.map(t => `
      <div class="ts-sidebar-link ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">
        <span class="sl-icon">${t.icon}</span> ${t.label}
      </div>
    `).join('')}
    <div class="ts-sidebar-link" style="color:var(--red);" onclick="doLogout()">
      <span class="sl-icon">🚪</span> تسجيل خروج
    </div>
  </div>`;

  let mainContent = '';

  if (activeTab === 'dashboard') {
    const totalSpent = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + (o.total || 0), 0);
    const pending = orders.filter(o => ['new','preparing','shipped'].includes(o.status)).length;
    const delivered = orders.filter(o => o.status === 'delivered').length;
    const products = DB.getProducts().slice(0, 4);

    mainContent = `
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px;">مرحباً بك، ${user.name} 👋</h2>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:900;color:var(--blue3);">${orders.length}</div>
        <div style="font-size:12px;color:var(--text3);">إجمالي الطلبات</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:900;color:var(--gold);">${pending}</div>
        <div style="font-size:12px;color:var(--text3);">قيد التوصيل</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:900;color:var(--green);">${delivered}</div>
        <div style="font-size:12px;color:var(--text3);">تم التوصيل</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-size:16px;font-weight:900;color:var(--purple);">${formatPrice(totalSpent)}</div>
        <div style="font-size:12px;color:var(--text3);">إجمالي الإنفاق</div>
      </div>
    </div>

    <h3 style="font-size:16px;font-weight:800;margin-bottom:12px;">آخر الطلبات</h3>
    ${orders.length === 0
      ? '<div style="color:var(--text3);text-align:center;padding:24px;background:var(--card);border-radius:12px;border:1px solid var(--border);">لا توجد طلبات بعد</div>'
      : orders.slice().reverse().slice(0, 4).map(o => {
          const [label] = statusLabel(o.status);
          const img = o.items && o.items[0] ? o.items[0].img : '';
          return `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="setTab('orders')">
            <img src="${img}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;flex-shrink:0;" onerror="this.src='https://placehold.co/48x48/0D1B30/60A5FA?text=📦'">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:700;">#${String(o.id).slice(-6)}</div>
              <div style="font-size:11px;color:var(--text3);">${(o.items||[]).length} منتج | ${new Date(o.date).toLocaleDateString('ar-EG')}</div>
            </div>
            <div style="text-align:left;flex-shrink:0;">
              <div style="font-size:13px;font-weight:800;color:var(--blue3);">${formatPrice(o.total)}</div>
              <span class="ts-status ts-status-${o.status}">${label}</span>
            </div>
          </div>`;
        }).join('')
    }

    <div style="margin-top:24px;">
      <div class="ts-section-title" style="margin-bottom:16px;">منتجات قد تعجبك <a href="products.html">عرض المزيد</a></div>
      <div class="ts-grid">
        ${products.map(p => `
        <div class="ts-product-card">
          <div class="ts-product-img"><a href="product.html?id=${p.id}"><img src="${p.images[0]}" onerror="this.src='https://placehold.co/300x220/0D1B30/60A5FA?text=📦'"></a></div>
          <div class="ts-product-body">
            <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit"><div class="ts-product-name">${p.name}</div></a>
            <div class="ts-product-price"><span class="ts-price">${formatPrice(p.price)}</span></div>
            <button class="ts-btn ts-btn-primary ts-btn-full ts-btn-sm" onclick="DB.addToCart(${p.id});showToast('تمت الإضافة 🛒');openCart()">🛒 أضف للسلة</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;

  } else if (activeTab === 'orders') {
    mainContent = `
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px;">📦 طلباتي</h2>
    ${orders.length === 0
      ? '<div class="ts-empty"><div class="empty-icon" style="font-size:48px">📦</div><h3>لا توجد طلبات</h3><p>لم تقم بأي طلبات بعد</p><a href="products.html" class="ts-btn ts-btn-primary">تسوق الآن</a></div>'
      : orders.slice().reverse().map(o => {
          const [label] = statusLabel(o.status);
          return `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
              <div>
                <div style="font-size:16px;font-weight:800;">طلب #${String(o.id).slice(-6)}</div>
                <div style="font-size:12px;color:var(--text3);">${new Date(o.date).toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
              </div>
              <div style="text-align:left;">
                <div style="font-size:18px;font-weight:900;color:var(--blue3);">${formatPrice(o.total)}</div>
                <span class="ts-status ts-status-${o.status}">${label}</span>
              </div>
            </div>
            <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
              ${(o.items||[]).map(item => `
              <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;padding:8px;min-width:140px;flex-shrink:0;">
                <img src="${item.img||''}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;" onerror="this.src='https://placehold.co/36x36/0D1B30/60A5FA?text=📦'">
                <div><div style="font-size:11px;font-weight:600;">${item.name}</div><div style="font-size:11px;color:var(--blue3);">${formatPrice(item.price)} × ${item.qty}</div></div>
              </div>`).join('')}
            </div>
            ${o.shipping ? `<div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text3);">📍 ${o.shipping.address||''}, ${o.shipping.area||''}, ${o.shipping.city||''} | 📞 ${o.shipping.phone||''}</div>` : ''}
          </div>`;
        }).join('')
    }`;

  } else if (activeTab === 'wishlist') {
    const wProducts = DB.getWishlist().map(id => DB.getProduct(id)).filter(Boolean);
    mainContent = `
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px;">❤️ المفضلة</h2>
    ${wProducts.length === 0
      ? '<div class="ts-empty"><div class="empty-icon" style="font-size:48px">🤍</div><h3>المفضلة فارغة</h3><p>أضف منتجات تعجبك</p><a href="products.html" class="ts-btn ts-btn-primary">تصفح المنتجات</a></div>'
      : `<div class="ts-grid">${wProducts.map(p => `
        <div class="ts-product-card">
          <div class="ts-product-img">
            <a href="product.html?id=${p.id}"><img src="${p.images[0]}" onerror="this.src='https://placehold.co/300x220/0D1B30/60A5FA?text=📦'"></a>
            <div class="ts-wish-btn active" onclick="DB.toggleWishlist(${p.id});render()">❤️</div>
          </div>
          <div class="ts-product-body">
            <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit"><div class="ts-product-name">${p.name}</div></a>
            <div class="ts-product-price"><span class="ts-price">${formatPrice(p.price)}</span></div>
            <button class="ts-btn ts-btn-primary ts-btn-full ts-btn-sm" onclick="DB.addToCart(${p.id});showToast('تمت الإضافة 🛒');openCart()">🛒 أضف للسلة</button>
          </div>
        </div>`).join('')}</div>`}`;

  } else if (activeTab === 'settings') {
    const av = user.avatar ? `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;">` : `<svg viewBox="0 0 24 24" fill="none" stroke="var(--blue3)" stroke-width="1.5" width="36" height="36"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    mainContent = `
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px;">⚙️ إعدادات الحساب</h2>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="width:80px;height:80px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;overflow:hidden;">${av}</div>
        <button class="ts-btn ts-btn-outline ts-btn-sm" onclick="document.getElementById('avatarInput').click()">📷 تغيير الصورة</button>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </div>
      <div class="ts-form-group"><label>الاسم الكامل</label><input type="text" class="ts-input" id="editName" value="${user.name}"></div>
      <div class="ts-form-group"><label>البريد الإلكتروني</label><input type="email" class="ts-input" id="editEmail" value="${user.email}"></div>
      <div class="ts-form-group"><label>رقم الهاتف</label><input type="tel" class="ts-input" id="editPhone" value="${user.phone||''}"></div>
      <div class="ts-form-group"><label>كلمة مرور جديدة (اتركها فارغة إن لم ترد التغيير)</label><input type="password" class="ts-input" id="editPw" placeholder="كلمة مرور جديدة"></div>
      <button class="ts-btn ts-btn-primary ts-btn-full" onclick="saveSettings()">💾 حفظ التغييرات</button>
    </div>`;

  } else if (activeTab === 'support') {
    mainContent = `
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px;">🎧 الدعم والمساعدة</h2>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">💬</div>
      <h3 style="margin-bottom:8px;">تحتاج مساعدة؟</h3>
      <p style="color:var(--text3);margin-bottom:20px;">فريق الدعم متاح 24/7 للرد على استفساراتك</p>
      <a href="chat.html" class="ts-btn ts-btn-primary">ابدأ محادثة</a>
    </div>`;
  }

  document.getElementById('accountContent').innerHTML = `
  <div class="ts-profile-layout">
    ${sidebar}
    <div>${mainContent}</div>
  </div>`;
}

function setTab(tab) {
  activeTab = tab;
  render();
  window.scrollTo(0, 0);
}

function doLogout() {
  DB.logout();
  location.href = 'index.html';
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const user = DB.getUser();
    if (!user) return;
    user.avatar = e.target.result;
    await DB.updateUser(user);
    showToast('تم تحديث الصورة ✅');
    render();
  };
  reader.readAsDataURL(file);
}

async function saveSettings() {
  const user = DB.getUser();
  if (!user) return;
  const name = document.getElementById('editName').value.trim();
  const email = document.getElementById('editEmail').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  const pw = document.getElementById('editPw').value;
  if (!name || !email) { showToast('يرجى ملء الاسم والبريد الإلكتروني', 'error'); return; }
  user.name = name;
  user.email = email;
  user.phone = phone;
  if (pw) user.password = pw;
  await DB.updateUser(user);
  showToast('تم حفظ التغييرات ✅');
  render();
}

window.setTab = setTab;
window.doLogout = doLogout;
window.uploadAvatar = uploadAvatar;
window.saveSettings = saveSettings;

document.addEventListener('DOMContentLoaded', async () => {
  await initPage();
  render();
});
</script>
</body>
</html>
